services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: federated_learning
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  django:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4"
    ports:
      - "8000:8000"
    environment:
      DEBUG: "False"
      DJANGO_SECRET_KEY: "django-insecure-production-key-change-me"
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: federated_learning
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: postgres
      DB_PORT: "5432"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/0"
      ALLOWED_HOSTS: "localhost,127.0.0.1,django,192.168.1.3"
      CORS_ALLOWED_ORIGINS: "http://localhost,http://127.0.0.1,http://192.168.1.3"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/admin/"]
      interval: 30s
      timeout: 10s
      retries: 3

  celery_worker:
    build: .
    command: celery -A config worker -l info
    environment:
      DEBUG: "False"
      DJANGO_SECRET_KEY: "django-insecure-production-key-change-me"
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: federated_learning
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: postgres
      DB_PORT: "5432"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/0"
    depends_on:
      - postgres
      - redis
      - django
    volumes:
      - .:/app

  celery_beat:
    build: .
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      DEBUG: "False"
      DJANGO_SECRET_KEY: "django-insecure-production-key-change-me"
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: federated_learning
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: postgres
      DB_PORT: "5432"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/0"
    depends_on:
      - postgres
      - redis
      - django
    volumes:
      - .:/app

  flower_server:
    build: .
    command: python fl_core/flower_server_runner.py
    ports:
      - "8080:8080"
    environment:
      DEBUG: "False"
      DJANGO_SECRET_KEY: "django-insecure-production-key-change-me"
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: federated_learning
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: postgres
      DB_PORT: "5432"
      CELERY_BROKER_URL: "redis://redis:6379/0"
    depends_on:
      - postgres
    volumes:
      - .:/app

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    depends_on:
      - django
    command: nginx -g "daemon off;"

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:
